    <script src="auth-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.handleAuthRedirect) window.handleAuthRedirect()
            if (window.syncAuthTokenFromCookie) window.syncAuthTokenFromCookie()

            try {
                if (!window.fetchWithAuth) return
                const res = await window.fetchWithAuth('/api/me')
                if (!res) return
                const data = await res.json()
                if (!data || !data.success || !data.user) return

                const role = window.normalizeGlobalRole
                    ? window.normalizeGlobalRole(data.user.role)
                    : String(data.user.role || 'user').toLowerCase()

                if (window.applyOwnerOnlyVisibility) window.applyOwnerOnlyVisibility(role)
                if (window.applyAdminOnlyVisibility) window.applyAdminOnlyVisibility(role)
            } catch (error) {
                console.warn('Unable to apply role-based pricing nav visibility', error)
            }
        })
    </script>
