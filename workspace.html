<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace</title>
    <link rel="stylesheet" href="developer-space.css">
    <script src="auth-client.js"></script>
    <style>
        .workspace-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        .workspace-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .workspace-header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }
        .workspace-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1.1em;
        }
        .workspace-meta {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .workspace-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .back-button:hover {
            background: #f0f0f0;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="workspace-container">
        <a href="/developerspaces.html" class="back-button">← Back to Workspaces</a>
        
        <div id="workspaceContent" class="loading">
            <p>Loading workspace...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            if (!isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            // Get workspace ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const workspaceId = urlParams.get('id');

            if (!workspaceId) {
                document.getElementById('workspaceContent').innerHTML = `
                    <div class="error">
                        <p>No workspace ID provided.</p>
                    </div>
                `;
                return;
            }

            try {
                // Fetch all workspaces and find the matching one
                const workspaces = await getWorkspaces();
                const workspace = workspaces.find(w => w.id === workspaceId);

                if (!workspace) {
                    document.getElementById('workspaceContent').innerHTML = `
                        <div class="error">
                            <p>Workspace not found.</p>
                        </div>
                    `;
                    return;
                }

                // Display workspace
                const createdDate = new Date(workspace.createdAt).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                const updatedDate = new Date(workspace.updatedAt).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                document.getElementById('workspaceContent').innerHTML = `
                    <div class="workspace-header">
                        <h1>${escapeHtml(workspace.name)}</h1>
                        <p>${escapeHtml(workspace.description || 'No description provided')}</p>
                        <div class="workspace-meta">
                            <span>📅 Created: ${createdDate}</span>
                            <span>🔄 Updated: ${updatedDate}</span>
                        </div>
                    </div>
                    <div class="workspace-content">
                        <h2>Workspace Content</h2>
                        <p>This is your workspace area. You can add tasks, notes, and collaborate with your team here.</p>
                        <p><em>Note: Workspace content management features are coming soon!</em></p>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading workspace:', error);
                
                if (error.message && error.message.includes('Unauthorized')) {
                    window.location.href = '/login.html';
                    return;
                }

                document.getElementById('workspaceContent').innerHTML = `
                    <div class="error">
                        <p>Error loading workspace: ${escapeHtml(error.message)}</p>
                    </div>
                `;
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
