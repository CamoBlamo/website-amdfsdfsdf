<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace</title>
    <link rel="stylesheet" href="developer-space.css">
    <script src="auth-client.js"></script>
    <style>
        .workspace-shell {
            max-width: 1400px;
            margin: 24px auto;
            padding: 16px;
        }
        .workspace-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .back-button {
            display: inline-block;
            padding: 10px 14px;
            background: #ffffff;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #ddd;
        }
        .workspace-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 16px;
        }
        .workspace-sidebar {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            height: fit-content;
            position: sticky;
            top: 12px;
        }
        .workspace-sidebar h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }
        .sidebar-btn {
            width: 100%;
            text-align: left;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .sidebar-btn.active {
            border-color: #667eea;
            background: #f5f7ff;
            font-weight: 700;
        }
        .workspace-main {
            display: grid;
            gap: 16px;
        }
        .panel {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
        }
        .panel h2 {
            margin: 0 0 10px;
            font-size: 20px;
        }
        .panel h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }
        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            color: #555;
            font-size: 14px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .kpi {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
        }
        .kpi strong {
            font-size: 20px;
            display: block;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        input, textarea, select {
            width: 100%;
            padding: 9px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea { min-height: 90px; }
        .btn {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 9px 12px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        .btn-danger {
            border-color: #ef4444;
            color: #ef4444;
        }
        .task-card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .task-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .tag {
            font-size: 12px;
            background: #f3f4f6;
            border-radius: 999px;
            padding: 4px 8px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .table th, .table td {
            border-bottom: 1px solid #eee;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        .status {
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid #ddd;
            display: inline-block;
        }
        .hidden { display: none; }
        .message {
            margin: 8px 0 0;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .message.ok { background: #ecfdf3; color: #166534; border: 1px solid #86efac; }
        .message.err { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        .loading, .error { padding: 24px; border-radius: 10px; }
        .loading { text-align: center; background: #fff; border: 1px solid #e5e7eb; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        @media (max-width: 1000px) {
            .workspace-layout { grid-template-columns: 1fr; }
            .workspace-sidebar { position: static; }
            .grid-2, .grid-3, .form-row, .form-row-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="workspace-shell">
        <div class="workspace-topbar">
            <a href="/developerspaces.html" class="back-button">← Back to Workspaces</a>
            <div id="mePill"></div>
        </div>

        <div id="workspaceContent" class="loading">Loading workspace...</div>
    </div>

    <script>
        let currentWorkspace = null;
        let currentUser = null;
        let workspaceState = null;

        document.addEventListener('DOMContentLoaded', initWorkspace);

        async function initWorkspace() {
            if (!isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            const workspaceId = new URLSearchParams(window.location.search).get('id');
            if (!workspaceId) return renderError('No workspace ID provided.');

            try {
                currentUser = await fetchMe();
                const payload = await fetchWorkspaceState(workspaceId);
                currentWorkspace = payload.workspace;
                workspaceState = ensureStateShape(payload.state);

                renderWorkspaceApp();
                bindGlobalEvents();
                renderAll();
            } catch (error) {
                console.error('Workspace init error:', error);
                renderError('Error loading workspace: ' + escapeHtml(error.message || 'Unknown error'));
            }
        }

        async function fetchMe() {
            const res = await fetchWithAuth('/api/me');
            if (!res) throw new Error('Unauthorized');
            const data = await res.json();
            if (!data.success || !data.user) throw new Error(data.error || 'Failed to load profile');
            const user = data.user;
            document.getElementById('mePill').textContent = `${user.name || user.username || user.email} • ${user.role || 'user'}`;
            return user;
        }

        function normalizeRole(role) {
            const allowed = ['workspace-admin', 'head-developer', 'developer', 'viewer'];
            return allowed.includes(role) ? role : 'developer';
        }

        function ensureStateShape(state) {
            const safe = state && typeof state === 'object' ? state : {};
            return {
                members: Array.isArray(safe.members) ? safe.members : [],
                tasks: Array.isArray(safe.tasks) ? safe.tasks : [],
                announcements: Array.isArray(safe.announcements) ? safe.announcements : [],
                settings: {
                    visibility: (safe.settings && safe.settings.visibility) || 'private',
                    allowMemberTaskCreate: safe.settings && typeof safe.settings.allowMemberTaskCreate === 'boolean'
                        ? safe.settings.allowMemberTaskCreate
                        : true,
                    defaultTaskStatus: (safe.settings && safe.settings.defaultTaskStatus) || 'todo'
                }
            };
        }

        async function fetchWorkspaceState(workspaceId) {
            const res = await fetchWithAuth(`/api/workspace-state?id=${encodeURIComponent(workspaceId)}`);
            if (!res) throw new Error('Unauthorized');
            const data = await res.json();
            if (!res.ok || !data.success) {
                throw new Error(data.error || 'Failed to load workspace state');
            }
            return data;
        }

        function saveWorkspaceState() {
            persistWorkspaceState().catch((error) => {
                console.error('Failed to save workspace state:', error);
                showMessage('settingsMessage', 'Failed to sync workspace state to server.', true);
            });
        }

        async function persistWorkspaceState() {
            const res = await fetchWithAuth(`/api/workspace-state?id=${encodeURIComponent(currentWorkspace.id)}`, {
                method: 'PUT',
                body: JSON.stringify({
                    name: currentWorkspace.name,
                    description: currentWorkspace.description || '',
                    state: workspaceState,
                }),
            });

            if (!res) throw new Error('Unauthorized');
            const data = await res.json();
            if (!res.ok || !data.success) {
                throw new Error(data.error || 'Failed to persist workspace state');
            }

            currentWorkspace = data.workspace;
            workspaceState = ensureStateShape(data.state);
            return data;
        }

        function getMeMember() {
            return workspaceState.members.find((m) => m.id === currentUser.id || (currentUser.email && m.email === currentUser.email));
        }

        function canManageWorkspace() {
            const globalOwner = (currentUser.role || '').toLowerCase() === 'owner';
            const meMember = getMeMember();
            const localAdmin = meMember && ['workspace-admin', 'head-developer'].includes(meMember.role);
            return !!(globalOwner || localAdmin);
        }

        function canCreateTasks() {
            if (canManageWorkspace()) return true;
            return !!workspaceState.settings.allowMemberTaskCreate;
        }

        function renderWorkspaceApp() {
            const createdDate = formatDate(currentWorkspace.createdAt);
            const updatedDate = formatDate(currentWorkspace.updatedAt);

            document.getElementById('workspaceContent').className = '';
            document.getElementById('workspaceContent').innerHTML = `
                <div class="workspace-layout">
                    <aside class="workspace-sidebar">
                        <h3>${escapeHtml(currentWorkspace.name)}</h3>
                        <button class="sidebar-btn active" data-section="overview">Overview</button>
                        <button class="sidebar-btn" data-section="tasks">Tasks</button>
                        <button class="sidebar-btn" data-section="members">Members & Roles</button>
                        <button class="sidebar-btn" data-section="announcements">Announcements</button>
                        <button class="sidebar-btn" data-section="settings">Settings</button>
                    </aside>

                    <main class="workspace-main">
                        <section class="panel" id="section-overview">
                            <h2>Workspace Overview</h2>
                            <div class="meta-row">
                                <span>Created: ${createdDate}</span>
                                <span>Updated: ${updatedDate}</span>
                                <span>ID: ${escapeHtml(currentWorkspace.id)}</span>
                            </div>
                            <p>${escapeHtml(currentWorkspace.description || 'No description provided')}</p>
                            <div class="grid-3" id="kpiGrid"></div>
                        </section>

                        <section class="panel hidden" id="section-tasks">
                            <h2>Tasks</h2>
                            <div class="grid-2">
                                <div>
                                    <h3>Create Task</h3>
                                    <div class="form-row">
                                        <input id="taskTitle" placeholder="Task title">
                                        <input id="taskDue" type="date">
                                    </div>
                                    <div class="form-row-3">
                                        <select id="taskPriority">
                                            <option value="low">Low</option>
                                            <option value="medium" selected>Medium</option>
                                            <option value="high">High</option>
                                            <option value="critical">Critical</option>
                                        </select>
                                        <select id="taskStatus">
                                            <option value="todo">Todo</option>
                                            <option value="in-progress">In Progress</option>
                                            <option value="review">Review</option>
                                            <option value="done">Done</option>
                                        </select>
                                        <select id="taskAssignee"></select>
                                    </div>
                                    <textarea id="taskDescription" placeholder="Description"></textarea>
                                    <div class="form-row">
                                        <input id="taskTags" placeholder="Tags (comma separated)">
                                        <button id="createTaskBtn" class="btn btn-primary">Create Task</button>
                                    </div>
                                    <div id="taskMessage"></div>
                                </div>
                                <div>
                                    <h3>Filter & Organize</h3>
                                    <div class="form-row-3">
                                        <select id="filterStatus">
                                            <option value="all">All Statuses</option>
                                            <option value="todo">Todo</option>
                                            <option value="in-progress">In Progress</option>
                                            <option value="review">Review</option>
                                            <option value="done">Done</option>
                                        </select>
                                        <select id="filterPriority">
                                            <option value="all">All Priorities</option>
                                            <option value="low">Low</option>
                                            <option value="medium">Medium</option>
                                            <option value="high">High</option>
                                            <option value="critical">Critical</option>
                                        </select>
                                        <input id="filterSearch" placeholder="Search tasks">
                                    </div>
                                    <p>Use inline controls per task to update status, assign, and delete.</p>
                                </div>
                            </div>
                            <div id="taskList"></div>
                        </section>

                        <section class="panel hidden" id="section-members">
                            <h2>Members & Roles</h2>
                            <div class="grid-2">
                                <div>
                                    <h3>Add Member</h3>
                                    <div class="form-row">
                                        <input id="memberName" placeholder="Name">
                                        <input id="memberEmail" placeholder="Email">
                                    </div>
                                    <div class="form-row">
                                        <select id="memberRole">
                                            <option value="developer">Developer</option>
                                            <option value="viewer">Viewer</option>
                                            <option value="head-developer">Head Developer</option>
                                            <option value="workspace-admin">Workspace Admin</option>
                                        </select>
                                        <button id="addMemberBtn" class="btn btn-primary">Add Member</button>
                                    </div>
                                    <div id="memberMessage"></div>
                                </div>
                                <div>
                                    <h3>Role Guide</h3>
                                    <ul>
                                        <li>Workspace Admin: full workspace management</li>
                                        <li>Head Developer: can manage tasks + members</li>
                                        <li>Developer: can work on tasks</li>
                                        <li>Viewer: read-only</li>
                                    </ul>
                                </div>
                            </div>
                            <table class="table">
                                <thead>
                                    <tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr>
                                </thead>
                                <tbody id="membersBody"></tbody>
                            </table>
                        </section>

                        <section class="panel hidden" id="section-announcements">
                            <h2>Announcements</h2>
                            <div class="form-row">
                                <input id="announceTitle" placeholder="Title">
                                <button id="postAnnouncementBtn" class="btn btn-primary">Post</button>
                            </div>
                            <textarea id="announceMessage" placeholder="Announcement message"></textarea>
                            <div id="announcementMessage"></div>
                            <div id="announcementList"></div>
                        </section>

                        <section class="panel hidden" id="section-settings">
                            <h2>Workspace Settings</h2>
                            <div class="form-row">
                                <input id="wsName" placeholder="Workspace name">
                                <select id="wsVisibility">
                                    <option value="private">Private</option>
                                    <option value="internal">Internal</option>
                                    <option value="public">Public</option>
                                </select>
                            </div>
                            <textarea id="wsDescription" placeholder="Workspace description"></textarea>
                            <div class="form-row">
                                <select id="wsDefaultStatus">
                                    <option value="todo">Default new task: Todo</option>
                                    <option value="in-progress">Default new task: In Progress</option>
                                    <option value="review">Default new task: Review</option>
                                </select>
                                <select id="wsAllowMemberTaskCreate">
                                    <option value="yes">Members can create tasks</option>
                                    <option value="no">Only admins can create tasks</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <button id="saveSettingsBtn" class="btn btn-primary">Save Settings</button>
                                <button id="clearWorkspaceDataBtn" class="btn btn-danger">Reset Workspace Data</button>
                            </div>
                            <div id="settingsMessage"></div>
                        </section>
                    </main>
                </div>
            `;

            document.getElementById('wsName').value = currentWorkspace.name || '';
            document.getElementById('wsDescription').value = currentWorkspace.description || '';
            document.getElementById('wsVisibility').value = workspaceState.settings.visibility || 'private';
            document.getElementById('wsDefaultStatus').value = workspaceState.settings.defaultTaskStatus || 'todo';
            document.getElementById('wsAllowMemberTaskCreate').value = workspaceState.settings.allowMemberTaskCreate ? 'yes' : 'no';
        }

        function bindGlobalEvents() {
            document.querySelectorAll('.sidebar-btn').forEach((btn) => {
                btn.addEventListener('click', () => showSection(btn.dataset.section));
            });

            document.getElementById('createTaskBtn').addEventListener('click', createTask);
            document.getElementById('filterStatus').addEventListener('change', renderTasks);
            document.getElementById('filterPriority').addEventListener('change', renderTasks);
            document.getElementById('filterSearch').addEventListener('input', renderTasks);

            document.getElementById('addMemberBtn').addEventListener('click', addMember);
            document.getElementById('postAnnouncementBtn').addEventListener('click', postAnnouncement);
            document.getElementById('saveSettingsBtn').addEventListener('click', saveWorkspaceSettings);
            document.getElementById('clearWorkspaceDataBtn').addEventListener('click', clearWorkspaceData);
        }

        function renderAll() {
            renderKpis();
            renderMemberOptions();
            renderTasks();
            renderMembers();
            renderAnnouncements();
            applyPermissionLocks();
        }

        function showSection(section) {
            document.querySelectorAll('.sidebar-btn').forEach((b) => b.classList.toggle('active', b.dataset.section === section));
            ['overview', 'tasks', 'members', 'announcements', 'settings'].forEach((name) => {
                const panel = document.getElementById(`section-${name}`);
                panel.classList.toggle('hidden', name !== section);
            });
        }

        function renderKpis() {
            const total = workspaceState.tasks.length;
            const done = workspaceState.tasks.filter((t) => t.status === 'done').length;
            const inProgress = workspaceState.tasks.filter((t) => t.status === 'in-progress').length;
            const overdue = workspaceState.tasks.filter((t) => t.dueDate && t.status !== 'done' && new Date(t.dueDate) < new Date()).length;
            const members = workspaceState.members.length;

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi"><strong>${total}</strong>Total Tasks</div>
                <div class="kpi"><strong>${inProgress}</strong>In Progress</div>
                <div class="kpi"><strong>${done}</strong>Completed</div>
                <div class="kpi"><strong>${overdue}</strong>Overdue</div>
                <div class="kpi"><strong>${members}</strong>Members</div>
                <div class="kpi"><strong>${workspaceState.announcements.length}</strong>Announcements</div>
            `;
        }

        function renderMemberOptions() {
            const assignee = document.getElementById('taskAssignee');
            assignee.innerHTML = '<option value="">Unassigned</option>';
            workspaceState.members.forEach((member) => {
                const option = document.createElement('option');
                option.value = member.id;
                option.textContent = `${member.name || member.email} (${member.role})`;
                assignee.appendChild(option);
            });
        }

        function createTask() {
            if (!canCreateTasks()) {
                return showMessage('taskMessage', 'Only workspace admins/head developers can create tasks in this workspace.', true);
            }

            const title = document.getElementById('taskTitle').value.trim();
            if (!title) return showMessage('taskMessage', 'Task title is required.', true);

            const description = document.getElementById('taskDescription').value.trim();
            const dueDate = document.getElementById('taskDue').value;
            const priority = document.getElementById('taskPriority').value;
            const status = document.getElementById('taskStatus').value || workspaceState.settings.defaultTaskStatus || 'todo';
            const assigneeId = document.getElementById('taskAssignee').value;
            const tags = document.getElementById('taskTags').value
                .split(',')
                .map((s) => s.trim())
                .filter(Boolean);

            const task = {
                id: `task_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                title,
                description,
                dueDate: dueDate || '',
                priority,
                status,
                assigneeId: assigneeId || '',
                tags,
                createdBy: currentUser.id,
                createdByName: currentUser.name || currentUser.username || currentUser.email,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            workspaceState.tasks.unshift(task);
            saveWorkspaceState();

            ['taskTitle', 'taskDescription', 'taskDue', 'taskTags'].forEach((id) => { document.getElementById(id).value = ''; });
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskStatus').value = workspaceState.settings.defaultTaskStatus || 'todo';
            document.getElementById('taskAssignee').value = '';

            showMessage('taskMessage', 'Task created.', false);
            renderAll();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const statusFilter = document.getElementById('filterStatus').value;
            const priorityFilter = document.getElementById('filterPriority').value;
            const searchFilter = document.getElementById('filterSearch').value.trim().toLowerCase();

            let tasks = [...workspaceState.tasks];
            if (statusFilter !== 'all') tasks = tasks.filter((t) => t.status === statusFilter);
            if (priorityFilter !== 'all') tasks = tasks.filter((t) => t.priority === priorityFilter);
            if (searchFilter) {
                tasks = tasks.filter((t) =>
                    (t.title || '').toLowerCase().includes(searchFilter) ||
                    (t.description || '').toLowerCase().includes(searchFilter) ||
                    (t.tags || []).join(' ').toLowerCase().includes(searchFilter)
                );
            }

            if (tasks.length === 0) {
                list.innerHTML = '<div class="task-card">No tasks found for current filters.</div>';
                return;
            }

            list.innerHTML = tasks.map((task) => {
                const assignee = workspaceState.members.find((m) => m.id === task.assigneeId);
                const assigneeName = assignee ? (assignee.name || assignee.email) : 'Unassigned';
                const due = task.dueDate ? formatDate(task.dueDate) : 'No due date';
                const dueLate = task.dueDate && task.status !== 'done' && new Date(task.dueDate) < new Date();
                const tags = (task.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('');

                return `
                    <div class="task-card">
                        <div class="task-head">
                            <strong>${escapeHtml(task.title)}</strong>
                            <span class="status">${escapeHtml(task.priority.toUpperCase())}</span>
                        </div>
                        <div>${escapeHtml(task.description || 'No description')}</div>
                        <div class="tags">${tags || '<span class="tag">No tags</span>'}</div>
                        <div class="meta-row">
                            <span>Assignee: ${escapeHtml(assigneeName)}</span>
                            <span>Status: ${escapeHtml(task.status)}</span>
                            <span>${dueLate ? '⚠️ Overdue' : 'Due'}: ${escapeHtml(due)}</span>
                        </div>
                        <div class="form-row-3" style="margin-top:10px;">
                            <select data-task-action="status" data-task-id="${task.id}">
                                <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>Todo</option>
                                <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                                <option value="review" ${task.status === 'review' ? 'selected' : ''}>Review</option>
                                <option value="done" ${task.status === 'done' ? 'selected' : ''}>Done</option>
                            </select>
                            <select data-task-action="assignee" data-task-id="${task.id}">
                                <option value="">Unassigned</option>
                                ${workspaceState.members.map((m) => `<option value="${m.id}" ${task.assigneeId === m.id ? 'selected' : ''}>${escapeHtml(m.name || m.email)}</option>`).join('')}
                            </select>
                            <button class="btn btn-danger" data-task-action="delete" data-task-id="${task.id}">Delete Task</button>
                        </div>
                    </div>
                `;
            }).join('');

            list.querySelectorAll('[data-task-action="status"]').forEach((el) => {
                el.addEventListener('change', () => updateTask(el.dataset.taskId, { status: el.value }));
            });
            list.querySelectorAll('[data-task-action="assignee"]').forEach((el) => {
                el.addEventListener('change', () => updateTask(el.dataset.taskId, { assigneeId: el.value }));
            });
            list.querySelectorAll('[data-task-action="delete"]').forEach((el) => {
                el.addEventListener('click', () => deleteTask(el.dataset.taskId));
            });
        }

        function updateTask(taskId, patch) {
            const index = workspaceState.tasks.findIndex((t) => t.id === taskId);
            if (index < 0) return;
            workspaceState.tasks[index] = {
                ...workspaceState.tasks[index],
                ...patch,
                updatedAt: new Date().toISOString()
            };
            saveWorkspaceState();
            renderAll();
        }

        function deleteTask(taskId) {
            const isAdmin = canManageWorkspace();
            const task = workspaceState.tasks.find((t) => t.id === taskId);
            const isCreator = task && task.createdBy === currentUser.id;
            if (!isAdmin && !isCreator) {
                return showMessage('taskMessage', 'Only admins, head developers, or task creator can delete this task.', true);
            }
            workspaceState.tasks = workspaceState.tasks.filter((t) => t.id !== taskId);
            saveWorkspaceState();
            showMessage('taskMessage', 'Task deleted.', false);
            renderAll();
        }

        function addMember() {
            if (!canManageWorkspace()) {
                return showMessage('memberMessage', 'Only workspace admins/head developers or owner can add members.', true);
            }

            const name = document.getElementById('memberName').value.trim();
            const email = document.getElementById('memberEmail').value.trim().toLowerCase();
            const role = normalizeRole(document.getElementById('memberRole').value);
            if (!email) return showMessage('memberMessage', 'Member email is required.', true);

            const existing = workspaceState.members.find((m) => (m.email || '').toLowerCase() === email);
            if (existing) return showMessage('memberMessage', 'That user is already in this workspace.', true);

            workspaceState.members.push({
                id: `member_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                name: name || email.split('@')[0],
                email,
                role,
                joinedAt: new Date().toISOString()
            });

            document.getElementById('memberName').value = '';
            document.getElementById('memberEmail').value = '';
            document.getElementById('memberRole').value = 'developer';

            saveWorkspaceState();
            showMessage('memberMessage', 'Member added.', false);
            renderAll();
        }

        function renderMembers() {
            const tbody = document.getElementById('membersBody');
            const canManage = canManageWorkspace();

            tbody.innerHTML = workspaceState.members.map((member) => {
                const roleSelect = canManage ? `
                    <select data-member-action="role" data-member-id="${member.id}">
                        <option value="workspace-admin" ${member.role === 'workspace-admin' ? 'selected' : ''}>workspace-admin</option>
                        <option value="head-developer" ${member.role === 'head-developer' ? 'selected' : ''}>head-developer</option>
                        <option value="developer" ${member.role === 'developer' ? 'selected' : ''}>developer</option>
                        <option value="viewer" ${member.role === 'viewer' ? 'selected' : ''}>viewer</option>
                    </select>`
                    : `<span>${escapeHtml(member.role)}</span>`;

                const canRemove = canManage && member.id !== currentUser.id;

                return `
                    <tr>
                        <td>${escapeHtml(member.name || '-')}</td>
                        <td>${escapeHtml(member.email || '-')}</td>
                        <td>${roleSelect}</td>
                        <td>${escapeHtml(formatDate(member.joinedAt))}</td>
                        <td>
                            ${canRemove ? `<button class="btn btn-danger" data-member-action="remove" data-member-id="${member.id}">Remove</button>` : '<span>-</span>'}
                        </td>
                    </tr>
                `;
            }).join('');

            tbody.querySelectorAll('[data-member-action="role"]').forEach((el) => {
                el.addEventListener('change', () => updateMemberRole(el.dataset.memberId, el.value));
            });
            tbody.querySelectorAll('[data-member-action="remove"]').forEach((el) => {
                el.addEventListener('click', () => removeMember(el.dataset.memberId));
            });
        }

        function updateMemberRole(memberId, role) {
            if (!canManageWorkspace()) return;
            const member = workspaceState.members.find((m) => m.id === memberId);
            if (!member) return;
            member.role = normalizeRole(role);
            saveWorkspaceState();
            showMessage('memberMessage', 'Role updated.', false);
            renderAll();
        }

        function removeMember(memberId) {
            if (!canManageWorkspace()) return;
            workspaceState.members = workspaceState.members.filter((m) => m.id !== memberId);
            workspaceState.tasks = workspaceState.tasks.map((t) => t.assigneeId === memberId ? { ...t, assigneeId: '' } : t);
            saveWorkspaceState();
            showMessage('memberMessage', 'Member removed.', false);
            renderAll();
        }

        function postAnnouncement() {
            const canPost = canManageWorkspace();
            if (!canPost) return showMessage('announcementMessage', 'Only workspace admins/head developers can post announcements.', true);

            const title = document.getElementById('announceTitle').value.trim();
            const message = document.getElementById('announceMessage').value.trim();
            if (!message) return showMessage('announcementMessage', 'Announcement message is required.', true);

            workspaceState.announcements.unshift({
                id: `announcement_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                title: title || 'Announcement',
                message,
                author: currentUser.name || currentUser.username || currentUser.email,
                createdAt: new Date().toISOString()
            });

            document.getElementById('announceTitle').value = '';
            document.getElementById('announceMessage').value = '';

            saveWorkspaceState();
            showMessage('announcementMessage', 'Announcement posted.', false);
            renderAll();
        }

        function renderAnnouncements() {
            const list = document.getElementById('announcementList');
            if (workspaceState.announcements.length === 0) {
                list.innerHTML = '<div class="task-card">No announcements yet.</div>';
                return;
            }

            list.innerHTML = workspaceState.announcements.map((a) => `
                <div class="task-card">
                    <div class="task-head">
                        <strong>${escapeHtml(a.title)}</strong>
                        <span class="status">${escapeHtml(formatDate(a.createdAt))}</span>
                    </div>
                    <div>${escapeHtml(a.message)}</div>
                    <div class="meta-row"><span>By ${escapeHtml(a.author || 'Unknown')}</span></div>
                </div>
            `).join('');
        }

        function saveWorkspaceSettings() {
            if (!canManageWorkspace()) return showMessage('settingsMessage', 'Only workspace admins/head developers or owner can change settings.', true);

            const name = document.getElementById('wsName').value.trim();
            const description = document.getElementById('wsDescription').value.trim();
            const visibility = document.getElementById('wsVisibility').value;
            const defaultTaskStatus = document.getElementById('wsDefaultStatus').value;
            const allowMemberTaskCreate = document.getElementById('wsAllowMemberTaskCreate').value === 'yes';

            currentWorkspace.name = name || currentWorkspace.name;
            currentWorkspace.description = description;
            currentWorkspace.updatedAt = new Date().toISOString();

            workspaceState.settings.visibility = visibility;
            workspaceState.settings.defaultTaskStatus = defaultTaskStatus;
            workspaceState.settings.allowMemberTaskCreate = allowMemberTaskCreate;

            saveWorkspaceState();
            renderWorkspaceApp();
            bindGlobalEvents();
            renderAll();
            showMessage('settingsMessage', 'Settings saved for this workspace.', false);
        }

        function clearWorkspaceData() {
            if (!canManageWorkspace()) return showMessage('settingsMessage', 'Only workspace admins/head developers or owner can reset workspace data.', true);
            if (!confirm('Reset all workspace data (tasks, members, announcements, settings) for everyone in this workspace?')) return;

            const meRole = (currentUser.role || '').toLowerCase() === 'owner' || currentWorkspace.userId === currentUser.id
                ? 'workspace-admin'
                : 'developer';

            workspaceState = ensureStateShape({
                members: [{
                    id: currentUser.id,
                    email: currentUser.email || '',
                    name: currentUser.name || currentUser.username || currentUser.email || 'You',
                    role: meRole,
                    joinedAt: new Date().toISOString()
                }],
                tasks: [],
                announcements: [],
                settings: {
                    visibility: 'private',
                    allowMemberTaskCreate: true,
                    defaultTaskStatus: 'todo'
                }
            });

            saveWorkspaceState();
            renderWorkspaceApp();
            bindGlobalEvents();
            renderAll();
            showMessage('settingsMessage', 'Workspace data reset.', false);
        }

        function applyPermissionLocks() {
            const admin = canManageWorkspace();
            const canCreate = canCreateTasks();

            document.getElementById('addMemberBtn').disabled = !admin;
            document.getElementById('memberName').disabled = !admin;
            document.getElementById('memberEmail').disabled = !admin;
            document.getElementById('memberRole').disabled = !admin;

            document.getElementById('postAnnouncementBtn').disabled = !admin;
            document.getElementById('announceTitle').disabled = !admin;
            document.getElementById('announceMessage').disabled = !admin;

            document.getElementById('saveSettingsBtn').disabled = !admin;
            document.getElementById('clearWorkspaceDataBtn').disabled = !admin;
            document.getElementById('wsName').disabled = !admin;
            document.getElementById('wsDescription').disabled = !admin;
            document.getElementById('wsVisibility').disabled = !admin;
            document.getElementById('wsDefaultStatus').disabled = !admin;
            document.getElementById('wsAllowMemberTaskCreate').disabled = !admin;

            document.getElementById('createTaskBtn').disabled = !canCreate;
            document.getElementById('taskTitle').disabled = !canCreate;
            document.getElementById('taskDue').disabled = !canCreate;
            document.getElementById('taskPriority').disabled = !canCreate;
            document.getElementById('taskStatus').disabled = !canCreate;
            document.getElementById('taskAssignee').disabled = !canCreate;
            document.getElementById('taskDescription').disabled = !canCreate;
            document.getElementById('taskTags').disabled = !canCreate;
        }

        function showMessage(elementId, text, isError) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.className = `message ${isError ? 'err' : 'ok'}`;
            el.textContent = text;
            setTimeout(() => {
                if (el.textContent === text) {
                    el.className = '';
                    el.textContent = '';
                }
            }, 2500);
        }

        function renderError(message) {
            document.getElementById('workspaceContent').className = 'error';
            document.getElementById('workspaceContent').innerHTML = `<p>${escapeHtml(message)}</p>`;
        }

        function formatDate(input) {
            if (!input) return '-';
            const date = new Date(input);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
