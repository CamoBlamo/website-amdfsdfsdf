    <script>
        // Handle OAuth redirects and button clicks
        document.addEventListener('DOMContentLoaded', () => {
            // Check for error in URL
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            if (error) {
                document.getElementById('error-messages').textContent = `Error: ${error}`;
            }

            // If already authenticated, redirect
            if (window.auth && window.auth.isAuthenticated()) {
                window.location.href = '/developerspaces.html';
            }

            // Setup button clicks
            document.getElementById('google-btn').addEventListener('click', (e) => {
                e.preventDefault();
                if (window.auth) window.auth.initiateGoogleLogin();
            });

            document.getElementById('discord-btn').addEventListener('click', (e) => {
                e.preventDefault();
                if (window.auth) window.auth.initiateDiscordLogin();
            });
        });
    </script>
